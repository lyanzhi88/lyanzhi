name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 缓存 SDK/NDK（加速重复构建）─────────────────────────────
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-docker-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-docker-${{ runner.os }}-

      # ── 用 Kivy 官方 Docker 镜像编译 ─────────────────────────────
      # 镜像内已预装：正确版本的 buildozer、Cython、Android SDK/NDK
      - name: Build APK with Kivy Docker
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          workdir: .
          buildozer_version: stable

      # ── 诊断：列出生成物 ──────────────────────────────────────────
      - name: List output
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -lah bin/ 2>/dev/null || echo "bin/ 不存在"
          echo "=== 搜索所有 .apk ==="
          find . -name "*.apk" 2>/dev/null || echo "未找到任何 APK"

      # ── 上传 APK ──────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xj-eeprom-apk
          path: bin/*.apk
          if-no-files-found: error

      # ── 始终上传编译日志 ──────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            *.log
            .buildozer/android/platform/build-*/dists/*/build.log
          if-no-files-found: ignore
