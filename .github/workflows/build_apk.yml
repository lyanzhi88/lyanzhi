name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 系统依赖 ───────────────────────────────────────────────
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            python3-pip python3-dev \
            autoconf automake libtool \
            pkg-config libssl-dev libffi-dev \
            build-essential ccache

      # ── 2. 强制 Java 17（修复 buildozer 找到 Java11 的问题）───────
      - name: Force Java 17
        run: |
          sudo update-java-alternatives -s java-1.17.0-openjdk-amd64 2>/dev/null || true
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version

      # ── 3. Python 工具（Cython < 3.0 兼容 buildozer）────────────
      - name: Install Python tools
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install "cython==0.29.37"
          pip3 install "buildozer==1.5.0"
          buildozer version

      # ── 4. 缓存 buildozer 目录 ────────────────────────────────────
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: bz-${{ runner.os }}-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: bz-${{ runner.os }}-v3-

      # ── 5. 预装 Android SDK cmdline-tools ───────────────────────
      - name: Setup Android SDK
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          mkdir -p "$SDK_ROOT/cmdline-tools"

          # 如果缓存已有 sdkmanager，跳过下载（避免 mv 覆盖已存在目录报错）
          if [ -f "$SDKMANAGER" ]; then
            echo "cmdline-tools 已在缓存中，跳过下载"
          else
            echo "下载 Android cmdline-tools..."
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
                 -O /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_tmp
            # 目标若已存在先删除再移入，彻底避免冲突
            rm -rf "$SDK_ROOT/cmdline-tools/latest"
            mv /tmp/cmdtools_tmp/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
          fi

          # 建旧路径软链接（buildozer 兼容，每次确保存在）
          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$SDKMANAGER" "$SDK_ROOT/tools/bin/sdkmanager"

          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          export ANDROID_SDK_ROOT="$SDK_ROOT"

          # 接受许可
          yes | sdkmanager --licenses --sdk_root="$SDK_ROOT" 2>/dev/null || true

          # 安装必要组件（已安装则跳过）
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" 2>/dev/null || true

          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT"     >> $GITHUB_ENV
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_ROOT/platform-tools"            >> $GITHUB_PATH
          echo "=== SDK 目录 ===" && ls "$SDK_ROOT"

      # ── 6. 编译 APK ───────────────────────────────────────────────
      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          java -version
          buildozer -v android debug 2>&1 | tee full_build.log
          echo "exit: ${PIPESTATUS[0]}"

      # ── 7. 诊断 ───────────────────────────────────────────────────
      - name: Show results
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -lah bin/ 2>/dev/null || echo "bin/ 不存在"
          echo "=== 搜索 APK ==="
          find . -name "*.apk" 2>/dev/null || echo "无 APK"

      # ── 8. 上传 APK ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xj-eeprom-apk
          path: bin/*.apk
          if-no-files-found: error

      # ── 9. 始终上传日志 ───────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: full_build.log
          if-no-files-found: ignore
